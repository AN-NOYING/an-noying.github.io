copyright: >
  Copyright &copy; 2016 - 2024 Annoying –
  <a href="#__consent">Change cookie settings</a>

site_author: AnNoying
site_description: 어노잉(AnNoying)의 이것저것 잡다하게 다루는 블로그입니다.
site_name: AnNoying's Blog
site_url: https://an-noying.github.io
theme:
  custom_dir: overrides
  favicon: assets/logo.png
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.prune
    - navigation.top
    - navigation.footer
    - navigation.sections
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tooltips
  font:
    code: Roboto Mono
    # text: Noto Sans KR
  language: ko
  logo: assets/logo.png
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      primary: pink
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      primary: pink
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra:
  analytics:
    provider: google
    property: G-Y723WYTJY3
  consent:
    actions:
      - accept
      - reject
      - manage
    title: Cookie consent
    description: >- 
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
  social:
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/channel/UCK0FIT7eGEXncgm2x-mbJRA

extra_css:
  - https://cdn.jsdelivr.net/npm/sakura-js@1.1.1/dist/sakura.min.css
  - stylesheets/extra.css
extra_javascript:
  - https://cdn.jsdelivr.net/npm/sakura-js@1.1.1/dist/sakura.min.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/gh/DellZHackintosh/msemoji@1.1.2/src/script/msemoji.min.js
  - https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js
  - javascripts/extra.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: python
          class: python
          validator: !!python/name:markdown_exec.validator
          format: !!python/name:markdown_exec.formatter
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true

nav:
  - Hello:
    - index.md
  - 유용한 도구:
    - blog/utils/index.md
  - 개발:
    - blog/development/index.md
  - 후기:
    - blog/review/index.md
  - 통계 및 분석:
    - blog/stat_anal/index.md
  - 프로그래밍:
    - blog/programming/index.md

plugins:
  - glightbox
  - search
  - markdown-exec
  - blog:
      blog_dir: blog/utils
      blog_toc: true
      authors_file: "{blog}/.authors.yml"
      archive: false
      post_url_format: "{date}/{file}"
  - blog:
      blog_dir: blog/development
      blog_toc: true
      authors_file: "{blog}/.authors.yml"
      archive: false
      categories_allowed:
        - Game
        - Etc
      post_url_format: "{date}/{file}"
  - blog:
      blog_dir: blog/review
      blog_toc: true
      authors_file: "{blog}/.authors.yml"
      archive: false
      categories_allowed:
        - Clothes
        - Electronics
      post_url_format: "{date}/{file}"
  - blog:
      blog_dir: blog/stat_anal
      blog_toc: true
      authors_file: "{blog}/.authors.yml"
      archive: false
      post_url_format: "{date}/{file}"
  - blog:
      blog_dir: blog/programming
      blog_toc: true
      authors_file: "{blog}/.authors.yml"
      archive: false
      categories_allowed:
        - CPP
        - Python
        - LuaScript
        - JavaScript
      post_url_format: "{date}/{file}"
  - tags
